name: Build & Push Backend

on:
  push:
    tags:
      - '*-fed.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve frontend version
        run: |
          if [ ! -f .frontend-version ]; then
            echo ".frontend-version is missing" >&2
            exit 1
          fi
          FRONTEND_REF=$(tr -d '[:space:]' < .frontend-version)
          if [ -z "$FRONTEND_REF" ]; then
            echo ".frontend-version is empty" >&2
            exit 1
          fi
          echo "FRONTEND_REF=$FRONTEND_REF" >> "$GITHUB_ENV"
          echo "FRONTEND_URL=https://github.com/Fedarisha/frontend/releases/download/${FRONTEND_REF}/remnawave-frontend.zip" >> "$GITHUB_ENV"

      - name: Wait for frontend release asset
        env:
          TOKEN: ${{ secrets.CLONE_TOKEN }}
        run: |
          for i in $(seq 1 60); do
            if curl -fsLI -H "Authorization: token ${TOKEN}" "${FRONTEND_URL}" >/dev/null; then
              echo "frontend asset ready (${FRONTEND_REF})"; exit 0
            fi
            echo "waiting for ${FRONTEND_URL} ($i/60)"; sleep 10
          done
          echo "frontend asset not found after 10 min: ${FRONTEND_URL}"; exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            FRONTEND_URL=${{ env.FRONTEND_URL }}
          secrets: |
            clone_token=${{ secrets.CLONE_TOKEN }}
          tags: |
            ${{ secrets.REGISTRY_URL }}/fedarisha/backend:latest
            ${{ secrets.REGISTRY_URL }}/fedarisha/backend:${{ github.ref_name }}
